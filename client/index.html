    <script async src="https://www.googletagmanager.com/gtag/js?id=G-0XC7YKTVF7"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-0XC7YKTVF7', {
        // Enhanced referrer attribution
        allow_google_signals: true,
        allow_ad_personalization_signals: true,
        send_page_view: true,
        // Enhanced ecommerce and conversion tracking
        enhanced_conversions: true,
        // Custom site URL for proper attribution
        custom_map: {
          'custom_parameter_site_name': 'SavviWell',
          'custom_parameter_source': 'source_attribution',
          'custom_parameter_campaign': 'campaign_attribution',
          'custom_parameter_medium': 'medium_attribution'
        },
        // Track waitlist page specifically
        page_title: document.title,
        page_location: window.location.href
      });

      // Track custom events for better attribution
      gtag('event', 'page_view', {
        page_title: document.title,
        page_location: window.location.href,
        custom_parameter_site_name: 'SavviWell'
      });

      // Automatic social media tracking based on referrer
      function trackSocialReferrer() {
        const referrer = document.referrer.toLowerCase();
        let socialSource = null;
        
        if (referrer.includes('instagram.com')) socialSource = 'instagram';
        else if (referrer.includes('tiktok.com')) socialSource = 'tiktok';
        else if (referrer.includes('pinterest.com')) socialSource = 'pinterest';
        else if (referrer.includes('whatsapp.com')) socialSource = 'whatsapp';
        else if (referrer.includes('twitter.com') || referrer.includes('t.co')) socialSource = 'twitter';
        else if (referrer.includes('linkedin.com')) socialSource = 'linkedin';
        else if (referrer.includes('facebook.com')) socialSource = 'facebook';
        
        if (socialSource) {
          gtag('event', 'social_referral', {
            social_platform: socialSource,
            referrer_url: document.referrer,
            landing_page: window.location.href
          });
        }
      }
      
      // Run social referrer tracking
      trackSocialReferrer();
    </script>

    <!-- UTM Parameter Tracking -->
    <script>
      // Capture and track UTM parameters for better attribution
      function trackUTMParameters() {
        const urlParams = new URLSearchParams(window.location.search);
        const utmSource = urlParams.get('utm_source');
        const utmMedium = urlParams.get('utm_medium');
        const utmCampaign = urlParams.get('utm_campaign');
        
        if (utmSource || utmMedium || utmCampaign) {
          gtag('event', 'campaign_attribution', {
            utm_source: utmSource || 'direct',
            utm_medium: utmMedium || 'none',
            utm_campaign: utmCampaign || 'none',
            page_location: window.location.href
          });
        }
      }
      
      // Run UTM tracking when page loads
      window.addEventListener('load', trackUTMParameters);
    </script>

    <!-- Enhanced Conversion Tracking -->
    <script>
      // Track form submissions as conversions with enhanced attribution
      function trackFormSubmission(formType, source) {
        gtag('event', 'form_submission', {
          form_type: formType,
          source: source,
          event_category: 'engagement',
          event_label: `${formType}_conversion`,
          page_location: window.location.href,
          page_title: document.title
        });
        
        // Track as conversion goal with enhanced data
        gtag('event', 'conversion', {
          send_to: 'G-0XC7YKTVF7',
          conversion_type: formType,
          source: source,
          page_path: window.location.pathname,
          page_location: window.location.href
        });
        
        // Track waitlist-specific conversions
        if (formType === 'lead_magnet') {
          gtag('event', 'generate_lead', {
            event_category: 'conversion',
            event_label: 'waitlist_lead',
            source: source,
            currency: 'USD',
            value: 1
          });
        }
      }

      // Track scroll depth for engagement
      let scrollDepthTracked = false;
      function trackScrollDepth() {
        if (scrollDepthTracked) return;
        const scrollPercent = Math.round((window.scrollY / (document.body.scrollHeight - window.innerHeight)) * 100);
        if (scrollPercent >= 75) {
          gtag('event', 'scroll_depth', {
            event_category: 'engagement',
            event_label: '75_percent_scroll',
            value: scrollPercent
          });
          scrollDepthTracked = true;
        }
      }

      // Track time on page
      let startTime = Date.now();
      function trackTimeOnPage() {
        const timeSpent = Math.round((Date.now() - startTime) / 1000);
        if (timeSpent >= 30) {
          gtag('event', 'engaged_session', {
            event_category: 'engagement',
            event_label: 'time_on_page',
            value: timeSpent
          });
        }
      }

      // Track external link clicks
      function trackExternalLinks() {
        document.addEventListener('click', function(e) {
          const link = e.target.closest('a');
          if (link && link.hostname !== window.location.hostname) {
            gtag('event', 'external_link_click', {
              event_category: 'engagement',
              event_label: link.hostname,
              link_url: link.href
            });
          }
        });
      }

      // Initialize enhanced tracking
      window.addEventListener('load', () => {
        trackExternalLinks();
        window.addEventListener('scroll', trackScrollDepth);
        setTimeout(trackTimeOnPage, 30000); // Track after 30 seconds
      });

      // Make form tracking available globally
      window.trackFormSubmission = trackFormSubmission;
    </script>
